<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>行程规划</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="main">
        <section class="list-panel" id="listPanel">
          <div class="list-header">
            <div class="list-title">
              <div class="list-top">
                <h1 id="pageTitle">行程标题</h1>
                <button class="minimize-btn" id="minimizeList" aria-label="最小化行程列表">－</button>
              </div>
              <p class="sub" id="pageSub">日期范围</p>
              <div class="summary" id="summary"></div>
            </div>
            <div class="list-actions">
            </div>
          </div>
          <div id="timeline" class="timeline"></div>
        </section>

        <section class="map-panel">
          <div id="map" class="map"></div>
          <div class="map-legend">
            <span><span class="dot flight"></span>飞行</span>
            <span><span class="dot drive"></span>自驾/城际</span>
            <span><span class="dot walk"></span>步行/市内</span>
          </div>
        </section>
      </main>

      <button class="list-toggle" id="listToggle" aria-expanded="true" aria-controls="listPanel" aria-label="切换行程列表">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect x="4" y="5" width="16" height="2" rx="1"></rect>
          <rect x="4" y="11" width="16" height="2" rx="1"></rect>
          <rect x="4" y="17" width="16" height="2" rx="1"></rect>
        </svg>
      </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
  </body>
</html>
